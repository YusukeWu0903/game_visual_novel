<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Visual Novel</title>
    <style>
      body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; }
      #game-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; cursor: pointer; }
      #dialog-box { width: 80%; height: 20%; background: rgba(0, 0, 0, 0.7); color: white; padding: 20px; box-sizing: border-box; border-radius: 10px; margin-bottom: 50px; display: flex; flex-direction: column; }
      #speaker { font-weight: bold; margin-bottom: 10px; color: #ffcc00; }
    </style>
  <link rel="stylesheet" href="/src/style.css"></head>
  <body>
    <div id="game-container">
      <div id="sprite-container"><img id="sprite" src="" style="display:none; height:100%;"/></div>
      <div id="dialog-box">
          <div id="speed-controls">
              <button class="speed-btn" data-speed="100">慢</button>
              <button class="speed-btn active" data-speed="50">中</button>
              <button class="speed-btn" data-speed="10">快</button>
          </div>
          <div id="speaker"></div>
          <div id="text"></div>
          <button id="fs-btn">全螢幕</button>
          </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
